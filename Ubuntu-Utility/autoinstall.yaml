autoinstall:
  version: 1
  packages:
    - ca-certificates
    - curl
    - gnupg
    - lsb-release
    - wget
    - apt-transport-https
    - zram-config
    - preload
    - flatpak
    - git
    - gparted
    - clamav
    - clamtk
    - postgresql
    - vlc
    - cmake
    - aptitude
    - doxygen
    - graphviz
    - net-tools
    - gdebi
    - dos2unix
    - texlive-latex-base
    - texlive-latex-extra
    - git-lfs
    - cryptsetup
    - lvm2
    - synaptic
    - stacer
    - build-essential
    - libvips-dev
    - jest
    - linux-tools-common
    - linux-tools-generic
    - gnome-tweaks
    - imagemagick
    - default-jdk
    - hplip
    - hplip-gui
    - redis
    - tor
  late-commands:
    - curtin in-target -- apt update
    - curtin in-target -- apt upgrade -y
    - curtin in-target -- apt install -y git-lfs
    - curtin in-target -- git lfs install
    - curtin in-target -- bash -c "sudo -u postgres psql -c 'ALTER USER postgres WITH PASSWORD \'postgres\';'"
    - curtin in-target -- systemctl start tor
    - curtin in-target -- systemctl enable tor
    - curtin in-target -- systemctl start redis-server
    - curtin in-target -- systemctl enable redis-server
    - curtin in-target -- bash -c 'wget -q --show-progress https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O google-chrome-stable_current_amd64.deb'
    - curtin in-target -- dpkg -i google-chrome-stable_current_amd64.deb || apt-get install -f -y
    - curtin in-target -- rm -f google-chrome-stable_current_amd64.deb
    - curtin in-target -- bash -c 'wget -q --show-progress https://github.com/shiftkey/desktop/releases/download/release-2.8.1-linux2/GitHubDesktop-linux-2.8.1-linux2.deb -O GitHubDesktop-linux-2.8.1-linux2.deb'
    - curtin in-target -- dpkg -i GitHubDesktop-linux-2.8.1-linux2.deb || apt-get install -f -y
    - curtin in-target -- rm -f GitHubDesktop-linux-2.8.1-linux2.deb
    - curtin in-target -- snap install --classic dbeaver-ce
    - curtin in-target -- snap install --classic openjdk
    - curtin in-target -- snap install --classic code
    - curtin in-target -- snap install --classic android-studio
    - curtin in-target -- snap install --classic eclipse
    - curtin in-target -- snap install intellij-idea-ultimate --classic
    - curtin in-target -- snap install node --classic
    - curtin in-target -- snap install telegram-desktop
    - curtin in-target -- snap install teams-for-linux
    - curtin in-target -- snap install pgadmin4
    - curtin in-target -- snap install perplexity-desktop
    - curtin in-target -- snap install scrcpy
    - curtin in-target -- snap install docker
    - curtin in-target -- snap start docker
    - curtin in-target -- groupadd docker
    - curtin in-target -- usermod -aG docker $USER
    - curtin in-target -- bash -c 'gsettings set org.gnome.desktop.interface show-battery-percentage true'
  interactive-sections:
    - identity

user-data:
  disable_root: true
  timezone: Europe/Rome
  locale: it_IT.UTF-8
  keyboard:
    layout: it
  gnome:
    settings:
      org.gnome.shell.extensions.dash-to-dock:
        dock-position: 'BOTTOM'
        autohide: true
        extend-height: false